# About Section
# about_title: About Me (Use this to override about section title)
about_profile_image: imgs/profile.jpg #(eg. images/profile.jpg)
about_content: | # this will include new lines to allow paragraphs
  Hello, I'm Suhyeon Ha :) 
  I'm currently pursuing the master's degree with the School of Computer Science and Engineering, Chung-Ang University,
  under the supervision of Prof. <a href="http://cau.ac.kr/~jskwon/jskwon.html">Junseok Kwon</a>.
  
  My research interests include <mark>Style Transfer</mark> and <mark>Colorization</mark> and <mark>Dehazing</mark>.

content:
  - title: Publications # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
#         title: Attentive Style Transfer with Target Feature Palette
#         link: Link to project (eg. sproogen.github.io/modern-resume-theme)(optional)
#         link_text: Link Text
        additional_links:
          - title:  Github page for the project
            icon: fab fa-github
            url: https://github.com/SuhyeonHa/Style-Transfer-with-Target-Feature-Palette-and-Attention-Coloring
#         quote: >
#           Short overview of the project (optional)
        description: | # this will include new lines to allow paragraphs
           <img src="imgs/img_eccvw_2020.png" width="100" height="100"></img>
           **Suhyeon Ha**, Guisik Kim and Junseok Kwon,
           8th Women in Computer Vision Workshop, 16th European Conference on Computer Vision Workshop (ECCVW),
           **Oral Presentation (in the Top 3 of submissions)**, Virtual, 2020
  - title: Experience
    layout: list
    content:
      - layout: right
        title: Company name
        sub_title: Job title
        caption: Date Range (eg. November 2016 - present)
        link: Link to company (optional)
        quote: >
          Short description of the company (optional)
        description: | # this will include new lines to allow paragraphs
          Description of role
  - title: Education
    layout: list
    content:
      - layout: top-right
        title: Institution name
        sub_title: Qualifications (eg. BA Performing Arts)
        caption: Date Range (eg. 2016 - 2019)
        quote: >
          Short institution or course description (optional)
        description: | # this will include new lines to allow paragraphs
          Description of qualification
  - title: A Little More About Me
    layout: text
    content: | # this will include new lines to allow paragraphs
      This is where you can write a little more about yourself. You could title this section **Interests** and include some of your other interests.
      Or you could title it **Skills** and write a bit more about things that make you more desirable, like *leadership* or *teamwork*

